version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    groups:
      # Batch minor/patch bumps for the same framework together
      next-ecosystem:
        patterns:
          - next
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
      tailwind-ecosystem:
        patterns:
          - tailwindcss
          - "@tailwindcss/*"
          - autoprefixer
          - postcss
    ignore:
      # Major bumps need manual review
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Kolkata
    commit-message:
      prefix: chore
